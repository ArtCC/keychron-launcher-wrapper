name: Build macOS DMG

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

jobs:
  build-macos-artifact:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS distributables
        run: npm run dist:mac -- --publish never

      - name: Upload DMG and ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keychron-launcher-wrapper-macos-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 30

  publish-macos-release:
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.ref_name, '.')
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish macOS release artifacts
        run: npm run dist:mac -- --publish onTag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
