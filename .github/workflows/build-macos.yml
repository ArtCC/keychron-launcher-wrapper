name: Build macOS DMG

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

jobs:
  build-macos-artifact:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS distributables
        run: npm run dist:mac -- --publish never

      - name: Upload DMG and ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keychron-launcher-wrapper-macos-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 30

  publish-macos-release:
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.ref_name, '.')
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS distributables
        run: npm run dist:mac -- --publish never

      - name: Generate release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          NOTES_FILE="release-notes.md"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { in_section = 1; print; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [[ ! -s "$NOTES_FILE" ]]; then
            {
              echo "## [$VERSION]"
              echo
              echo "No changelog entry found for this version."
            } > "$NOTES_FILE"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Keychron Launcher Wrapper v${{ steps.changelog.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            dist/*.dmg
            dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
